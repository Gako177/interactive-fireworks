<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Fireworks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom, #000428 0%, #004e92 100%);
            height: 100vh;
            overflow: hidden;
            cursor: crosshair;
            font-family: 'Arial', sans-serif;
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 100;
        }

        .instructions {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 1.2em;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            z-index: 100;
        }

        canvas {
            display: block;
            background: transparent;
        }

        .firework {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            pointer-events: none;
        }

        .trail {
            position: absolute;
            width: 2px;
            height: 20px;
            border-radius: 1px;
            pointer-events: none;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
        }

        @keyframes sparkle {
            0% { opacity: 0; transform: scale(0); }
            50% { opacity: 1; transform: scale(1.2); }
            100% { opacity: 0; transform: scale(0); }
        }

        .sparkle {
            animation: sparkle 1.5s ease-out;
        }
    </style>
</head>
<body>
    <h1 class="title">🎆 Interactive Fireworks 🎆</h1>
    <p class="instructions">Click anywhere to create beautiful fireworks!</p>
    
    <script>
        class Firework {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.targetY = y - Math.random() * 300 - 200;
                this.speed = 5;
                this.trail = [];
                this.exploded = false;
                this.particles = [];
                this.element = null;
                this.createFirework();
            }

            createFirework() {
                this.element = document.createElement('div');
                this.element.className = 'firework';
                this.element.style.left = this.x + 'px';
                this.element.style.top = this.y + 'px';
                this.element.style.background = this.getRandomColor();
                this.element.style.boxShadow = `0 0 10px ${this.element.style.background}`;
                document.body.appendChild(this.element);
            }

            getRandomColor() {
                const colors = [
                    '#FF6B6B', '#4ECDC4', '#45B7D1', '#FFA07A',
                    '#98D8C8', '#F7DC6F', '#BB8FCE', '#85C1E9',
                    '#F8C471', '#82E0AA', '#F1948A', '#AED6F1'
                ];
                return colors[Math.floor(Math.random() * colors.length)];
            }

            update() {
                if (!this.exploded) {
                    this.y -= this.speed;
                    this.element.style.top = this.y + 'px';
                    
                    // Create trail effect
                    this.createTrail();
                    
                    if (this.y <= this.targetY) {
                        this.explode();
                    }
                } else {
                    this.updateParticles();
                }
            }

            createTrail() {
                const trail = document.createElement('div');
                trail.className = 'trail';
                trail.style.left = (this.x - 1) + 'px';
                trail.style.top = (this.y + 10) + 'px';
                trail.style.background = this.element.style.background;
                document.body.appendChild(trail);
                
                setTimeout(() => {
                    if (trail.parentNode) {
                        trail.remove();
                    }
                }, 500);
            }

            explode() {
                this.exploded = true;
                this.element.remove();
                
                // Create explosion particles
                const particleCount = 30 + Math.random() * 20;
                const colors = [this.element.style.background];
                
                // Add some complementary colors
                for (let i = 0; i < 2; i++) {
                    colors.push(this.getRandomColor());
                }

                for (let i = 0; i < particleCount; i++) {
                    this.createParticle(colors[Math.floor(Math.random() * colors.length)]);
                }

                // Play explosion sound effect (visual)
                this.createShockwave();
            }

            createParticle(color) {
                const particle = {
                    x: this.x,
                    y: this.y,
                    vx: (Math.random() - 0.5) * 15,
                    vy: (Math.random() - 0.5) * 15,
                    gravity: 0.3,
                    life: 100,
                    maxLife: 100,
                    color: color,
                    element: null
                };

                particle.element = document.createElement('div');
                particle.element.className = 'particle sparkle';
                particle.element.style.left = particle.x + 'px';
                particle.element.style.top = particle.y + 'px';
                particle.element.style.background = particle.color;
                particle.element.style.boxShadow = `0 0 8px ${particle.color}`;
                document.body.appendChild(particle.element);

                this.particles.push(particle);
            }

            createShockwave() {
                const shockwave = document.createElement('div');
                shockwave.style.position = 'absolute';
                shockwave.style.left = (this.x - 50) + 'px';
                shockwave.style.top = (this.y - 50) + 'px';
                shockwave.style.width = '100px';
                shockwave.style.height = '100px';
                shockwave.style.borderRadius = '50%';
                shockwave.style.border = '3px solid rgba(255,255,255,0.6)';
                shockwave.style.transform = 'scale(0)';
                shockwave.style.transition = 'transform 0.6s ease-out, opacity 0.6s ease-out';
                shockwave.style.opacity = '1';
                document.body.appendChild(shockwave);

                setTimeout(() => {
                    shockwave.style.transform = 'scale(8)';
                    shockwave.style.opacity = '0';
                }, 10);

                setTimeout(() => {
                    if (shockwave.parentNode) {
                        shockwave.remove();
                    }
                }, 600);
            }

            updateParticles() {
                for (let i = this.particles.length - 1; i >= 0; i--) {
                    const particle = this.particles[i];
                    
                    particle.x += particle.vx;
                    particle.y += particle.vy;
                    particle.vy += particle.gravity;
                    particle.life--;

                    const opacity = particle.life / particle.maxLife;
                    particle.element.style.left = particle.x + 'px';
                    particle.element.style.top = particle.y + 'px';
                    particle.element.style.opacity = opacity;

                    if (particle.life <= 0) {
                        particle.element.remove();
                        this.particles.splice(i, 1);
                    }
                }
            }

            isDead() {
                return this.exploded && this.particles.length === 0;
            }
        }

        class FireworkShow {
            constructor() {
                this.fireworks = [];
                this.init();
            }

            init() {
                document.addEventListener('click', (e) => {
                    this.createFirework(e.clientX, window.innerHeight);
                });

                // Automatic fireworks every few seconds
                setInterval(() => {
                    if (Math.random() < 0.3) {
                        this.createRandomFirework();
                    }
                }, 3000);

                this.animate();
            }

            createFirework(x, y) {
                const firework = new Firework(x, y);
                this.fireworks.push(firework);
            }

            createRandomFirework() {
                const x = Math.random() * window.innerWidth;
                const y = window.innerHeight;
                this.createFirework(x, y);
            }

            animate() {
                // Update all fireworks
                for (let i = this.fireworks.length - 1; i >= 0; i--) {
                    this.fireworks[i].update();
                    
                    if (this.fireworks[i].isDead()) {
                        this.fireworks.splice(i, 1);
                    }
                }

                requestAnimationFrame(() => this.animate());
            }
        }

        // Initialize the firework show
        window.addEventListener('load', () => {
            new FireworkShow();
            
            // Welcome fireworks
            setTimeout(() => {
                const centerX = window.innerWidth / 2;
                const fireworkShow = new FireworkShow();
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        fireworkShow.createFirework(
                            centerX + (Math.random() - 0.5) * 200,
                            window.innerHeight
                        );
                    }, i * 300);
                }
            }, 1000);
        });

        // Add some background stars
        function createStars() {
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.style.position = 'absolute';
                star.style.left = Math.random() * window.innerWidth + 'px';
                star.style.top = Math.random() * window.innerHeight + 'px';
                star.style.width = '2px';
                star.style.height = '2px';
                star.style.background = 'white';
                star.style.borderRadius = '50%';
                star.style.opacity = Math.random() * 0.8 + 0.2;
                star.style.animation = `sparkle ${Math.random() * 3 + 2}s infinite`;
                document.body.appendChild(star);
            }
        }

        createStars();
    </script>
</body>
</html>
